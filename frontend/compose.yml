services:
  alloy:
    image: grafana/alloy:v1.15.1
    container_name: faro-demo-alloy
    command:
      - run
      - /etc/alloy/config.alloy
      - --storage.path=/var/lib/alloy/data
      - --server.http.listen-addr=0.0.0.0:12345
    depends_on:
      - loki
      - tempo
    ports:
      - "12345:12345"
      - "12347:12347"
    volumes:
      - ./observability/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - alloy-data:/var/lib/alloy/data

  grafana:
    image: grafana/grafana:13.0.1
    container_name: faro-demo-grafana
    depends_on:
      - loki
      - tempo
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro

  loki:
    image: grafana/loki:3.7.1
    container_name: faro-demo-loki
    command:
      - -config.file=/etc/loki/config.yml
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki/config.yml:/etc/loki/config.yml:ro
      - loki-data:/loki

  tempo:
    image: grafana/tempo:2.10.4
    container_name: faro-demo-tempo
    command:
      - -config.file=/etc/tempo/tempo.yml
    ports:
      - "3200:3200"
      - "4318:4318"
    volumes:
      - ./observability/tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo-data:/var/tempo

volumes:
  alloy-data:
  grafana-data:
  loki-data:
  tempo-data:
