name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── runs in parallel after install ───────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/faro-showcase
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/faro-showcase/package-lock.json
      - run: npm ci
      - run: npm run lint

  vuln-check:
    name: Vulnerability Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/faro-showcase
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/faro-showcase/package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=high

  docker-validate:
    name: Validate Docker Compose
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose config

  observability-validate:
    name: Validate Observability Configs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Alloy config syntax
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/frontend/observability/alloy/config.alloy:/etc/alloy/config.alloy:ro \
            grafana/alloy:v1.15.1 \
            fmt /etc/alloy/config.alloy

      - name: Validate Loki config
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/frontend/observability/loki/config.yml:/etc/loki/config.yml:ro \
            grafana/loki:3.7.1 \
            -config.file=/etc/loki/config.yml -verify-config

      - name: Validate Tempo config
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/frontend/observability/tempo/tempo.yml:/etc/tempo/tempo.yml:ro \
            grafana/tempo:2.10.4 \
            -config.file=/etc/tempo/tempo.yml -verify-config

      - name: Validate Grafana datasources YAML
        run: |
          python3 -c "
          import yaml, sys
          path = 'frontend/observability/grafana/provisioning/datasources/datasources.yml'
          with open(path) as f:
              doc = yaml.safe_load(f)
          assert 'datasources' in doc, 'missing datasources key'
          print(f'OK — {len(doc[\"datasources\"])} datasource(s) defined')
          "

  # ── build depends on lint passing ─────────────────────────────────────────
  build:
    name: Build
    needs: [lint]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/faro-showcase
    env:
      NEXT_TELEMETRY_DISABLED: 1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/faro-showcase/package-lock.json
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: frontend/faro-showcase/.next
          retention-days: 1

  # ── test + coverage depends on build passing ──────────────────────────────
  test:
    name: Test & Coverage
    needs: [build]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/faro-showcase
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/faro-showcase/package-lock.json
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: next-build
          path: frontend/faro-showcase/.next
      - run: npm run test:coverage
      - uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: frontend/faro-showcase/coverage/lcov.info
          fail_ci_if_error: true
